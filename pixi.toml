[workspace]
authors = ["Oscar Barragan <oscar.barragan@physics.ox.ac.uk>"]
channels = ["conda-forge"]
name = "pyaneti"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"
preview = ["pixi-build"]


[tasks]

[package] 
name = "pyaneti"
version = "2.1.0"

[package.build] 
backend = { name = "pixi-build-python", version = "==0.4.0" }

[package.host-dependencies]
hatchling = "==1.26.3"

[dependencies]
python = "3.11.*"
numpy = "==1.26.0"
meson = ">=1.0.1"
meson-python = ">=0.16.0"
lapack = "*"
ninja = "*"
pkg-config = "*"
pip = "*"
wheel = "*"
make = "*"
cmake = "*"
compilers = "*"
cython = ">=3.2.4,<4"
requests = ">=2.32.5,<3"
zstandard = ">=0.25.0,<0.26"

[pypi-dependencies]
pyaneti = { path = "." }
